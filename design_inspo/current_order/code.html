<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GreenBrew POS - Checkout</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "surface": "#f4fcf0",
                            "surface-container-high": "#e3eadf",
                            "on-error": "#ffffff",
                            "primary-fixed": "#7ffc97",
                            "on-surface": "#171d16",
                            "surface-container-highest": "#dde5d9",
                            "outline": "#6e7b6c",
                            "on-tertiary-container": "#fffbff",
                            "surface-container-low": "#eff6ea",
                            "tertiary-container": "#c74668",
                            "tertiary-fixed-dim": "#ffb2bf",
                            "on-background": "#171d16",
                            "surface-container": "#e9f0e5",
                            "primary-container": "#00873a",
                            "primary-fixed-dim": "#62df7d",
                            "on-primary-fixed-variant": "#005320",
                            "on-secondary-container": "#007233",
                            "on-tertiary": "#ffffff",
                            "surface-bright": "#f4fcf0",
                            "outline-variant": "#bdcaba",
                            "secondary-fixed-dim": "#79db8d",
                            "on-tertiary-fixed-variant": "#8a143c",
                            "tertiary-fixed": "#ffd9de",
                            "inverse-surface": "#2b322b",
                            "secondary-container": "#92f5a4",
                            "secondary": "#006d30",
                            "on-primary": "#ffffff",
                            "on-secondary-fixed": "#00210a",
                            "on-surface-variant": "#3e4a3d",
                            "surface-variant": "#dde5d9",
                            "inverse-on-surface": "#ecf3e7",
                            "on-tertiary-fixed": "#3f0016",
                            "secondary-fixed": "#95f8a7",
                            "on-secondary": "#ffffff",
                            "primary": "#006b2c",
                            "on-secondary-fixed-variant": "#005323",
                            "on-primary-fixed": "#002109",
                            "error": "#ba1a1a",
                            "error-container": "#ffdad6",
                            "surface-tint": "#006e2d",
                            "surface-container-lowest": "#ffffff",
                            "tertiary": "#a72d51",
                            "surface-dim": "#d5dcd1",
                            "on-error-container": "#93000a",
                            "inverse-primary": "#62df7d",

                            "on-primary-container": "#f7fff2"
                    },
                    "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                    },
                    "spacing": {
                            "xs": "4px",
                            "lg": "24px",
                            "grid-gutter": "16px",
                            "md": "16px",
                            "xl": "32px",
                            "grid-margin": "24px",
                            "touch-target-min": "44px",
                            "sm": "8px",
                            "2xl": "48px",
                            "base": "4px"
                    },
                    "fontFamily": {
                            "display-lg": ["Geist"],
                            "headline-lg-mobile": ["Geist"],
                            "label-md": ["Geist"],

                    "fontSize": {

                            "label-lg": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                            "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                            "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                            "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                            "body-lg-mobile": ["16px", {"lineHeight": "1.4", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen font-body-md text-on-background flex justify-center">
<div class="w-full max-w-md bg-surface min-h-screen relative shadow-[0_12px_32px_rgba(15,23,42,0.12)] flex flex-col">
<!-- Transactional Header (Suppressed main nav for checkout flow) -->
<header class="sticky top-0 bg-surface z-20 border-b border-outline-variant flex items-center px-4 h-touch-target-min">
<button class="p-2 -ml-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="ml-2 font-headline-md text-headline-md-mobile text-on-surface tracking-tight">Current Order</h1>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto pb-32 px-grid-margin pt-6">
<!-- Order Items List -->
<div class="flex flex-col">
<!-- Item 1: Cafe Latte -->
<div class="py-4 border-b border-outline-variant group">
<div class="flex justify-between items-start mb-2">
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">Cafe Latte</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">+ Oat Milk x1</p>
</div>
<span class="font-label-lg text-label-lg text-on-surface">₱420</span>
</div>
<div class="flex justify-between items-center mt-4">
<!-- Quantity Adjuster -->
<div class="flex items-center gap-1 bg-surface-container rounded-full p-1 border border-outline-variant">
<button class="w-8 h-8 rounded-full flex items-center justify-center text-on-surface bg-surface shadow-sm hover:bg-surface-container-highest active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="font-label-lg text-label-lg text-on-surface w-6 text-center">2</span>
<button class="w-8 h-8 rounded-full flex items-center justify-center text-on-surface bg-surface shadow-sm hover:bg-surface-container-highest active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
<!-- Actions -->
<div class="flex gap-2">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-error-container hover:text-error transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
</div>
<!-- Item 2: Matcha Latte -->
<div class="py-4 border-b border-outline-variant group">
<div class="flex justify-between items-start mb-2">
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">Matcha Latte</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">+ Vanilla x2</p>
</div>
<span class="font-label-lg text-label-lg text-on-surface">₱230</span>
</div>
<div class="flex justify-between items-center mt-4">
<!-- Quantity Adjuster -->
<div class="flex items-center gap-1 bg-surface-container rounded-full p-1 border border-outline-variant">
<button class="w-8 h-8 rounded-full flex items-center justify-center text-on-surface bg-surface shadow-sm hover:bg-surface-container-highest active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="font-label-lg text-label-lg text-on-surface w-6 text-center">1</span>
<button class="w-8 h-8 rounded-full flex items-center justify-center text-on-surface bg-surface shadow-sm hover:bg-surface-container-highest active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
<!-- Actions -->
<div class="flex gap-2">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-error-container hover:text-error transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
</div>
</div>
<!-- Order Summary -->
<div class="mt-8 bg-surface-container-low rounded-xl p-4 border border-outline-variant">
<div class="flex flex-col gap-3">
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Subtotal</span>
<span>₱650</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Discount</span>
<span>₱0</span>
</div>
<div class="h-px w-full bg-outline-variant my-1"></div>
<div class="flex justify-between font-headline-md text-headline-md-mobile text-on-surface">
<span>Total</span>
<span>₱650</span>
</div>
</div>
</div>
</main>
<!-- Sticky Checkout Action Area -->
<div class="absolute bottom-0 w-full bg-surface border-t border-outline-variant p-4 pb-8 shadow-[0_-4px_12px_rgba(15,23,42,0.08)] z-30">
<!-- Note: Using theme-derived colors for gradient to follow strict design system rules while achieving the requested gradient effect -->
<button class="w-full h-16 rounded-full bg-gradient-to-r from-primary to-primary-fixed-dim text-on-primary flex items-center justify-between px-8 shadow-md hover:opacity-95 active:scale-[0.98] transition-all duration-200">
<span class="font-label-lg text-label-lg tracking-wider">CHECKOUT</span>
<span class="font-headline-md text-headline-md-mobile">₱650</span>
</button>
</div>
</div>
</body></html>
