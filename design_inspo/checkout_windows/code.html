<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GreenBrew POS - Checkout</title>

<style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');
        body { font-family: 'Geist', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background h-full w-full overflow-hidden flex items-center justify-center">
<!-- Faux Background (Register Screen behind modal) -->
<div class="fixed inset-0 opacity-20 bg-surface-container-highest flex">
<!-- Mock Register Content to give context to the overlay -->
<div class="w-2/3 p-lg flex flex-col gap-lg">
<div class="h-2xl w-full bg-surface-variant rounded-lg"></div>
<div class="flex-1 grid grid-cols-3 gap-md">
<div class="bg-surface rounded-lg"></div>
<div class="bg-surface rounded-lg"></div>
<div class="bg-surface rounded-lg"></div>
</div>
</div>
<div class="w-1/3 bg-surface border-l border-outline-variant"></div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-[#0f172a] bg-opacity-40 backdrop-blur-sm z-40 flex items-center justify-center p-grid-margin">
<!-- Checkout Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-[1024px] h-[720px] rounded-xl shadow-[0_12px_32px_rgba(15,23,42,0.12)] flex flex-col overflow-hidden relative z-50 animate-[slideUp_0.3s_ease-out]">
<!-- Modal Header -->
<div class="h-2xl px-lg border-b border-outline-variant flex items-center justify-between bg-surface">
<h2 class="font-headline-md text-headline-md text-on-surface">Checkout</h2>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="flex-1 flex overflow-hidden">
<!-- Left Column: Order Summary -->
<div class="w-[400px] border-r border-outline-variant bg-surface flex flex-col">
<div class="p-lg border-b border-outline-variant">
<h3 class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider mb-sm">Order #1042</h3>
<div class="flex justify-between items-end">
<span class="font-body-md text-body-md text-on-surface-variant">3 Items</span>
<span class="font-headline-lg text-headline-lg text-primary">$24.50</span>
</div>
</div>
<div class="flex-1 overflow-y-auto p-md space-y-sm">
<!-- Order Items -->
<div class="flex justify-between items-start py-sm border-b border-surface-variant">
<div>
<p class="font-body-lg text-body-lg text-on-surface">Iced Matcha Latte</p>
<p class="font-body-md text-body-md text-on-surface-variant">Oat Milk, Large</p>
</div>
<span class="font-body-lg text-body-lg text-on-surface">$6.50</span>
</div>
<div class="flex justify-between items-start py-sm border-b border-surface-variant">
<div>
<p class="font-body-lg text-body-lg text-on-surface">Avocado Toast</p>
<p class="font-body-md text-body-md text-on-surface-variant">Add Poached Egg</p>
</div>
<span class="font-body-lg text-body-lg text-on-surface">$14.00</span>
</div>
<div class="flex justify-between items-start py-sm border-b border-surface-variant">
<div>
<p class="font-body-lg text-body-lg text-on-surface">Cold Brew</p>
<p class="font-body-md text-body-md text-on-surface-variant">Regular</p>
</div>
<span class="font-body-lg text-body-lg text-on-surface">$4.00</span>
</div>
</div>
<!-- Totals -->
<div class="p-lg bg-surface-container-low mt-auto">
<div class="space-y-sm mb-md">
<div class="flex justify-between text-on-surface-variant font-body-md text-body-md">
<span>Subtotal</span>
<span>$24.50</span>
</div>
<div class="flex justify-between text-on-surface-variant font-body-md text-body-md">
<span>Tax</span>
<span>$2.08</span>
</div>
</div>
<div class="flex justify-between items-center pt-md border-t border-outline-variant">
<span class="font-headline-md text-headline-md text-on-surface">Total</span>
<span class="font-display-lg text-display-lg text-on-surface">$26.58</span>
</div>
</div>
</div>
<!-- Right Column: Payment Methods -->
<div class="flex-1 p-xl flex flex-col bg-surface-container-lowest">
<!-- Payment Method Tabs -->
<div class="grid grid-cols-3 gap-md mb-xl">
<button class="h-2xl rounded-lg flex items-center justify-center gap-sm bg-primary-container text-on-primary-container font-label-lg text-label-lg shadow-[0_4px_12px_rgba(15,23,42,0.08)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">payments</span>
                            Cash
                        </button>
<button class="h-2xl rounded-lg flex items-center justify-center gap-sm bg-surface border border-outline-variant text-on-surface font-label-lg text-label-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">credit_card</span>
                            Card
                        </button>
<button class="h-2xl rounded-lg flex items-center justify-center gap-sm bg-surface border border-outline-variant text-on-surface font-label-lg text-label-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">contactless</span>
                            Wallet
                        </button>
</div>
<!-- Cash Entry Area (Active State) -->
<div class="flex-1 flex flex-col items-center justify-center max-w-md mx-auto w-full">
<!-- Input Display -->
<div class="w-full h-2xl border-2 border-primary bg-surface rounded-lg mb-xl flex items-center px-md justify-between shadow-[0_0_0_4px_rgba(22,163,74,0.1)]">
<span class="font-body-lg text-body-lg text-on-surface-variant">Amount Received</span>
<span class="font-headline-lg text-headline-lg text-on-surface">$30.00</span>
</div>
<!-- Numeric Keypad -->
<div class="grid grid-cols-3 gap-sm w-full mb-xl">
<!-- Row 1 -->
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">1</button>
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">2</button>
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">3</button>
<!-- Row 2 -->
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">4</button>
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">5</button>
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">6</button>
<!-- Row 3 -->
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">7</button>
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">8</button>
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">9</button>
<!-- Row 4 -->
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">00</button>
<button class="h-[72px] bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface transition-colors flex items-center justify-center">0</button>
<button class="h-[72px] bg-surface border border-outline-variant hover:bg-surface-container-high active:bg-surface-variant rounded-lg font-headline-lg text-headline-lg text-on-surface-variant transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<div class="w-full flex justify-between items-center px-md py-sm bg-secondary-container text-on-secondary-container rounded-lg mb-xl">
<span class="font-body-lg text-body-lg">Change Due</span>
<span class="font-headline-md text-headline-md">$3.42</span>
</div>
<!-- Action Button -->
<button class="w-full h-2xl bg-primary hover:bg-surface-tint text-on-primary rounded-lg font-label-lg text-label-lg shadow-[0_4px_12px_rgba(15,23,42,0.08)] transition-all active:scale-[0.98] flex items-center justify-center gap-sm mt-auto">
<span class="material-symbols-outlined">check_circle</span>
                            Complete Payment
                        </button>
</div>
</div>
</div>
</div>
</div>
</body></html>
